# bazarr-topn configuration
# Environment variables can be used anywhere with ${VAR_NAME} syntax.

# Bazarr API — used read-only for media inventory.
bazarr:
  url: "http://localhost:6767"
  api_key: "${BAZARR_API_KEY}"

# Languages to download subtitles for (ISO 639-1 codes).
languages:
  - en
  - tr

# How many additional subtitles to download per video per language.
# Bazarr owns rank 1. We download ranks 2 through N+1.
# With top_n=10, you get 11 total options (1 from Bazarr + 10 from us).
top_n: 10

# Minimum subliminal score to accept a subtitle (0–100).
# Higher = stricter matching. Recommended: 30–50.
# Set to 0 to accept everything subliminal finds.
min_score: 30

# Maximum subtitle downloads per run. 0 = unlimited.
# Useful if your provider has daily limits (OpenSubtitles free = 20/day).
# With OpenSubtitles VIP, set to 0.
max_downloads_per_cycle: 0

# Delay in seconds between subtitle downloads (default: 5.0).
# Prevents OpenSubtitles from killing your session due to rapid requests.
# Without this, the API drops your session after ~100 rapid downloads and
# refuses re-authentication for a while. Set to 0 to disable (not recommended).
# Speed doesn't matter: the daily download quota resets every 24h, so a slow
# batch that finishes within a day has the same throughput as a fast one.
download_delay: 5.0

# Delay in seconds before each subtitle search (default: 3.0).
# Each search triggers ~9 API calls (3 pages × 3 criteria). Without a delay
# between searches, a large library scan fires hundreds of API calls in
# rapid succession, triggering OpenSubtitles' anti-abuse block — which can
# get your API consumer administratively disabled, not just rate-limited.
search_delay: 3.0

# Rate-limit retry behavior. Subliminal's ProviderPool discards a provider
# permanently on any exception during search or download — including
# OpenSubtitles' "Too Many Requests". That means one 429 mid-scan silently
# breaks every subsequent video in the batch. We detect the discard, clear
# it, sleep, and retry. Backoff doubles each attempt (60s → 120s → ...).
# Set retries to 0 to disable.
rate_limit_retries: 2
rate_limit_initial_backoff: 60.0

# Sidecar metadata — tracks download state per video+language.
# Enables smart skip logic: partial failures get retried, niche content
# (fewer subs available than top_n) is recognized as complete, and
# raising top_n later triggers re-download of upgraded targets.
# Set to false to disable sidecars and fall back to always reprocessing.
topn_sidecar_enabled: true

# Re-check interval in days. Sidecars older than this age are treated as
# stale and the video is re-processed — even if it was previously marked
# done. Keeps niche content re-searched regularly in case new subs appear,
# and lets any rate-limit victim recover within a few days. Default is
# low because the server side is cheap; raise this if download quota
# becomes a concern.
topn_recheck_days: 3

# Maximum candidates to try per video+language when downloading.
# OpenSubtitles often returns broken/empty files. We iterate deeper
# into the candidate list (beyond top_n) when downloads fail, up to
# this cap. Set to 0 for unlimited (not recommended for large libraries).
max_candidates_tried: 50

# Subtitle file naming pattern.
# Available variables: {video_stem}, {lang}, {rank}
# Rank starts at 2 (rank 1 is Bazarr's subtitle).
naming_pattern: "{video_stem}.{lang}.topn-{rank}.srt"

# Subliminal providers and their credentials.
# Uncomment and configure providers you have accounts for.
providers:
  - name: opensubtitlescom
    username: "${OPENSUBTITLES_USERNAME}"
    password: "${OPENSUBTITLES_PASSWORD}"
    # Max API result pages to fetch per search criterion (default: 3).
    # Each page returns ~20 results. With 2-3 search criteria per video,
    # 3 pages = ~180 candidates total — more than enough for top_n=10.
    # OpenSubtitles API rejects requests beyond page 20.
    # Set to 0 for unlimited (not recommended).
    max_result_pages: 3
  # - name: addic7ed
  #   username: "${ADDIC7ED_USERNAME}"
  #   password: "${ADDIC7ED_PASSWORD}"
  # - name: podnapisi
  # - name: tvsubtitles

# ffsubsync — automatic timing correction.
# Requires: pip install bazarr-topn[sync] (or [sync-silero] for best quality)
#
# DEFAULT: DISABLED. In real use on my own library, ffsubsync made subtitle
# timing *worse* more often than it helped — especially with OpenSubtitles
# hash-matched subs, which are already aligned to the release. Enabling it
# introduced drift on well-synced files I would not have re-synced by hand.
#
# The top-N shotgun approach is the intended workaround: download many
# candidates and let one of them naturally fit the release, rather than
# re-timing a single pick.
#
# If you want to enable it: test on a handful of files first, compare
# before/after in a player, and only flip it on for your full library if
# the results are consistently better for your sources. Results vary with
# subtitle source, video encoding, and audio characteristics.
ffsubsync:
  enabled: false

  # Golden-section search — searches for the mathematically optimal framerate
  # ratio instead of testing only common presets (23.976/25, etc.).
  # Slower (runs the sync pipeline multiple times) but significantly more accurate.
  # Default: true. Set to false only if you need faster processing.
  gss: true

  # Voice activity detection method for speech extraction from video.
  # "silero" uses a deep learning model — 4x more accurate than "webrtc" (the
  # ffsubsync default) at detecting speech. Requires torch (~2GB install).
  # Options: silero, webrtc, auditok, subs_then_silero, subs_then_webrtc, subs_then_auditok
  # The "subs_then_*" variants first try embedded subtitle tracks, then fall back to VAD.
  # Default: silero. Use "webrtc" if you can't install torch.
  vad: silero

  # Max offset in seconds any subtitle segment can shift.
  # Default: 600 (10 minutes). Handles any realistic offset without inviting false matches.
  # ffsubsync's own default is 60s which is too low for badly timed subs.
  max_offset_seconds: 600

  # Disable automatic framerate correction. Do NOT enable this with gss — they conflict.
  # Default: false. Only set to true if framerate correction is causing problems.
  # no_fix_framerate: false

  # Which stream in the video to sync against (ffmpeg format).
  # Useful for multi-audio files. Examples: "a:0" (first audio), "a:1" (second audio)
  # reference_stream: "a:0"

  # Any additional ffsubsync CLI flags not covered above.
  # extra_args: []

# Path mappings — translate Docker container paths to host paths.
# Required when Bazarr runs in Docker and --all returns container paths
# like /media/movies/... instead of host paths like /mnt/media/movies/...
# path_mappings:
#   - container: "/media"
#     host: "/mnt/media"

# Watch mode paths — directories to monitor with `bazarr-topn watch`.
watch_paths:
  - "/path/to/movies"
  - "/path/to/tv"

# Cooldown in seconds after a file event before processing.
# Prevents processing incomplete downloads.
watch_cooldown: 30

# Cold-start catch-up scan. Inotify only fires for future events, so any
# video files present before the watcher starts are invisible to it
# (e.g. files dropped in while the service was down, or during a redeploy
# gap). On startup we do a single pass over watch_paths to process any
# videos missing topn subs. Cheap on subsequent restarts — videos that
# already have topn subs are skipped via an on-disk check.
watch_cold_start_scan: true

# Logging level for console output: DEBUG, INFO, WARNING, ERROR
# DEBUG shows all internal details; INFO (default) shows clean progress output.
log_level: "INFO"

# Log file — full DEBUG output always written here regardless of console log level.
# Includes all subliminal, ffsubsync, and torch internals for diagnosing issues.
# Leave unset to disable file logging.
# log_file: "/var/log/bazarr-topn.log"
